    label: "🇧🇷 Primeiros Passos: Conceitos Iniciais"
    folder: "src/content/docs/pt-br/start/conceitos-iniciais"
    create: true
    media_folder: "/src/assets/images"
    public_folder: "/src/assets/images"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Template", name: "template", widget: "hidden", default: "doc" }
      - { label: "Conteúdo", name: "body", widget: "markdown" }

  - name: "pt-br_start_licenca"
