name: Deploy Astro site to Pages

on:
  push:
    branches: ["main"]  
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Evita loop infinito se o commit for feito por este próprio bot
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ==========================================
      # ETAPA 1: SCRIPT PYTHON
      # =========================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.5' 

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install openai python-dotenv 

      - name: Executar script de traduções/correções
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -u scripts/verify.py

      - name: Commit e Push das traduções
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-correção: Script de traduções [skip ci]"
          git push origin main

      # ==========================================
      # ETAPA 2: BUILD DO ASTRO E PUBLICAÇÃO
      # ==========================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Instalar dependências Node
        run: npm install

      - name: Build do Astro
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload dos artefatos
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ==========================================
      # ETAPA 3: NOTIFICAÇÕES NO DISCORD
      # ==========================================
      - name: Notificar Discord (Sucesso)
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "✅ **Deploy Concluído!** A documentação da Monsta foi atualizada com sucesso no GitHub Pages e já está no ar."}' \
          $DISCORD_WEBHOOK

      - name: Notificar Discord (Falha)
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "❌ **Erro no Deploy!** A rotina de atualização da documentação falhou no GitHub Actions. Verifique os logs para mais detalhes."}' \
          $DISCORD_WEBHOOK
